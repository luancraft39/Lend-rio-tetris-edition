<!DOCTYPE html>
<!-- saved from url=(0043)https://www.lncc.br/~borges/php/testar.html -->
<html lang="pt-br" style="--dynamic-glow:#a000f0;"><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lendário Tetris Edition v6.1</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.08);
            --bg-deep: #020617;
            --dynamic-glow: #00d2ff;
        }

        body {
            background: var(--bg-deep);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* FUNDO ANIMADO (Gráfico Médio/Pro) */
        @keyframes bgScroll { from { background-position: 0 0; } to { background-position: 0 1000px; } }
        #bg-canvas-container {
            position: fixed; inset: 0; z-index: -1; opacity: 0.3;
            background-image: radial-gradient(var(--secondary) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: bgScroll 60s linear infinite;
        }

        /* EFEITOS */
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(0, 0); } }
        .shake-it { animation: shake 0.15s ease-in-out; }
        .flash-it { animation: flashEffect 0.2s ease-out; }
        @keyframes flashEffect { 0% { background-color: rgba(255, 255, 255, 0.5); } 100% { background-color: rgba(0, 0, 0, 0.4); } }

        /* MENU PRINCIPAL */
        #menu-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(20px); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; text-align: center;
        }

        .game-title {
            font-size: 3.5rem; font-weight: 900; margin: 0; line-height: 1;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .studio-tag { color: var(--primary); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 25px; opacity: 0.8; }

        .menu-nav { display: flex; flex-direction: column; gap: 10px; width: 260px; }
        
        /* MODAIS */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 200; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #0f172a; padding: 25px; border-radius: 20px; 
            border: 1px solid var(--primary); width: 80%; max-width: 320px;
        }

        /* GAMEPLAY */
        #game-wrapper {
            display: flex; gap: 20px; padding: 20px;
            background: var(--glass); border-radius: 25px;
            border: 2px solid var(--dynamic-glow);
            box-shadow: 0 0 30px var(--dynamic-glow);
            transition: 0.3s;
        }

        canvas#tetris { background: rgba(0,0,0,0.6); border-radius: 12px; }

        .ui-side { display: flex; flex-direction: column; gap: 12px; width: 100px; }
        .ui-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .ui-label { font-size: 8px; color: var(--primary); text-transform: uppercase; }
        .ui-value { font-size: 16px; font-weight: bold; font-family: monospace; }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; width: 95%; max-width: 400px; }
        .btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; touch-action: manipulation; }
        .btn-main { background: var(--primary); color: #000; font-weight: bold; border: none; }
        .btn-wide { grid-column: span 2; font-size: 0.8rem; }
        
        .graphic-btns { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        .btn-small { padding: 5px 10px; font-size: 10px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 5px; cursor: pointer; }
        .active-gfx { background: var(--primary) !important; color: black !important; border-color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="bg-canvas-container"></div>

    <!-- MENU -->
    <div id="menu-overlay" class="hidden">
        <div class="studio-tag">LENDÁRIO STUDIO APRESENTA</div>
        <h1 class="game-title">LENDÁRIO<br>TETRIS EDITION</h1>
        <div style="font-size: 0.6rem; margin-bottom: 20px;">VERSION 6.1</div>

        <div class="menu-nav">
            <button class="btn btn-main" onclick="start()">INICIAR JOGO</button>
            <button class="btn" onclick="toggleModal(&#39;modal-config&#39;)">CONFIGURAÇÕES</button>
            <button class="btn" onclick="toggleModal(&#39;modal-modes&#39;)">MODOS / PISTAS</button>
            <button class="btn" onclick="toggleModal(&#39;modal-help&#39;)">AJUDA</button>
        </div>
        
        <div style="margin-top: 30px; font-size: 0.8rem; color: #64748b;">Recorde: <span id="record-val">0</span></div>
    </div>

    <!-- MODAL CONFIG -->
    <div id="modal-config" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top:0">Configurações</h3>
            <label style="font-size: 12px;">Qualidade dos Gráficos:</label>
            <div class="graphic-btns">
                <button id="gfx-low" class="btn-small" onclick="setGfx(&#39;low&#39;)">BAIXO</button>
                <button id="gfx-med" class="btn-small active-gfx" onclick="setGfx(&#39;med&#39;)">MÉDIO</button>
                <button id="gfx-pro" class="btn-small" onclick="setGfx(&#39;pro&#39;)">PRO</button>
            </div>
            <br>
            <button class="btn btn-main" style="width:100%" onclick="toggleModal(&#39;modal-config&#39;)">VOLTAR</button>
        </div>
    </div>

    <!-- MODAL AJUDA -->
    <div id="modal-help" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Como Jogar</h3>
            <p style="font-size: 13px; line-height: 1.5;">Use as setas para mover, o botão de raio para queda instantânea e complete as linhas para subir de nível!</p>
            <button class="btn btn-main" style="width:100%" onclick="toggleModal(&#39;modal-help&#39;)">ENTENDI</button>
        </div>
    </div>

    <div id="modal-modes" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Modos</h3>
            <p>Em breve novos modos e pistas!</p>
            <button class="btn btn-main" style="width:100%" onclick="toggleModal(&#39;modal-modes&#39;)">VOLTAR</button>
        </div>
    </div>

    <audio id="bg-music" loop="">
        <source src="https://files.catbox.moe/resxkn.m4a" type="audio/mpeg">
    </audio>

    <!-- JOGO -->
    <div id="game-wrapper" class="">
        <canvas id="tetris" width="220" height="420"></canvas>
        <div class="ui-side">
            <div class="ui-box"><div class="ui-label">Próxima</div><canvas id="next" width="80" height="80"></canvas></div>
            <div class="ui-box"><div class="ui-label">Pontos</div><div id="score" class="ui-value">0</div></div>
            <div class="ui-box"><div class="ui-label">Nível</div><div id="level" class="ui-value">1</div></div>
        </div>
    </div>

    <div class="controls" id="game-ui-ctrl">
        <button class="btn" onclick="move(-1)">&#8592;</button>
        <button class="btn" onclick="drop()">&#8595;</button>
        <button class="btn" onclick="move(1)">&#8594;</button>
        <button class="btn" style="color:var(--primary)" onclick="hardDrop()">&#9889;</button>
        <button class="btn btn-wide" onclick="rotatePiece()">GIRAR PEÇA</button>
        <button class="btn btn-wide" onclick="hardDrop()">INSTANTÂNEO</button>
    </div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next');
    const nextCtx = nextCanvas.getContext('2d');
    const bgMusic = document.getElementById('bg-music');
    
    ctx.scale(20, 20);
    nextCtx.scale(20, 20);

    let gfxLevel = 'med';
    let arena, player, running = false;
    const colors = [null, '#00f0f0', '#f0a000', '#0000f0', '#f0f000', '#f00000', '#00f000', '#a000f0'];

    function setGfx(level) {
        gfxLevel = level;
        document.querySelectorAll('.btn-small').forEach(b => b.classList.remove('active-gfx'));
        document.getElementById('gfx-' + level).classList.add('active-gfx');
        
        const bg = document.getElementById('bg-canvas-container');
        bg.style.display = (level === 'low') ? 'none' : 'block';
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    function createPiece(type) {
        if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        if (type === 'O') return [[4,4],[4,4]];
        if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
        if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
        if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
    }

    function drawMatrix(c, matrix, offset, isGhost = false) {
        matrix.forEach((row, y) => {
            row.forEach((v, x) => {
                if (v !== 0) {
                    if (isGhost) {
                        c.strokeStyle = 'rgba(255,255,255,0.1)';
                        c.strokeRect(x + offset.x, y + offset.y, 0.9, 0.9);
                    } else {
                        if (gfxLevel !== 'low') {
                            c.shadowBlur = (gfxLevel === 'pro') ? 20 : 10;
                            c.shadowColor = colors[v];
                        }
                        c.fillStyle = colors[v];
                        c.fillRect(x + offset.x, y + offset.y, 0.9, 0.9);
                        c.shadowBlur = 0;
                    }
                }
            });
        });
    }

    function collide(arena, p) {
        const [m, o] = [p.matrix, p.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function resetPlayer() {
        const pieces = 'ILJOTSZ';
        if (!player.next) player.next = createPiece(pieces[Math.random() * 7 | 0]);
        player.matrix = player.next;
        player.next = createPiece(pieces[Math.random() * 7 | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        
        let colorId = player.matrix.flat().find(v => v !== 0);
        document.documentElement.style.setProperty('--dynamic-glow', colors[colorId]);

        if (collide(arena, player)) {
            running = false;
            document.getElementById('menu-overlay').classList.remove('hidden');
            document.getElementById('game-wrapper').classList.add('hidden');
            document.getElementById('game-ui-ctrl').classList.add('hidden');
        }
    }

    function drop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            player.matrix.forEach((row, y) => {
                row.forEach((v, x) => { if (v !== 0) arena[y + player.pos.y][x + player.pos.x] = v; });
            });
            if (gfxLevel === 'pro') {
                document.getElementById('game-wrapper').classList.add('shake-it');
                setTimeout(() => document.getElementById('game-wrapper').classList.remove('shake-it'), 100);
            }
            resetPlayer();
            sweep();
        }
    }

    function hardDrop() {
        while (!collide(arena, player)) player.pos.y++;
        player.pos.y--;
        drop(); // Aproveita a lógica do merge
    }

    function sweep() {
        let rows = 0;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            if (arena[y].every(v => v !== 0)) {
                arena.splice(y, 1);
                arena.unshift(new Array(11).fill(0));
                rows++; y++;
            }
        }
        if (rows > 0) {
            player.score += (rows * 100) * player.level;
            player.lines += rows;
            player.level = Math.floor(player.lines / 10) + 1;
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
        }
    }

    function move(d) { player.pos.x += d; if (collide(arena, player)) player.pos.x -= d; }

    function rotatePiece() {
        const m = JSON.parse(JSON.stringify(player.matrix));
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
        }
        m.forEach(row => row.reverse());
        const old = player.matrix; player.matrix = m;
        if (collide(arena, player)) player.matrix = old;
    }

    function draw() {
        ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const ghost = { x: player.pos.x, y: player.pos.y };
        while (!collide(arena, { pos: ghost, matrix: player.matrix })) ghost.y++;
        ghost.y--;
        drawMatrix(ctx, player.matrix, ghost, true);
        drawMatrix(ctx, arena, {x: 0, y: 0});
        drawMatrix(ctx, player.matrix, player.pos);

        nextCtx.fillStyle = '#111'; nextCtx.fillRect(0, 0, 4, 4);
        drawMatrix(nextCtx, player.next, {x: 0.5, y: 0.5});
    }

    function gameLoop() {
        if (!running) return;
        draw();
        requestAnimationFrame(gameLoop);
    }

    function start() {
        arena = Array.from({length: 21}, () => new Array(11).fill(0));
        player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0, lines: 0, level: 1 };
        running = true;
        bgMusic.play().catch(() => {});
        document.getElementById('menu-overlay').classList.add('hidden');
        document.getElementById('game-wrapper').classList.remove('hidden');
        document.getElementById('game-ui-ctrl').classList.remove('hidden');
        resetPlayer();
        gameLoop();
    }

    document.addEventListener('keydown', e => {
        if (!running) return;
        if (e.keyCode === 37) move(-1);
        if (e.keyCode === 39) move(1);
        if (e.keyCode === 40) drop();
        if (e.keyCode === 38) rotatePiece();
        if (e.keyCode === 32) hardDrop();
    });
</script>


		

		</body></html>
